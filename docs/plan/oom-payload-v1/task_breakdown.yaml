           from @df-comparison/shared-oom
        2. Set APP_NAME = "externalized-payloads"
        3. Call initializeTelemetry({ connectionString, appName: APP_NAME }) at module top level
           BEFORE any function registrations (reads APPLICATIONINSIGHTS_CONNECTION_STRING env var)
        4. Create telemetry = createTelemetryHelper(APP_NAME)
        5. Register orchestrator via df.app.orchestration() using createInstrumentedExternalizedOrchestrator(telemetry)
        6. Register sub-orchestrator for continueAsNew batching
        7. Register all 3 activities via df.app.activity() using instrumented wrappers with telemetry
        8. Register HTTP starter function at POST /api/orchestrators/{orchestratorName}
