  - id: T6
    title: Create apps/externalized-payloads function app
    description: |
      Create the externalized-payloads function app under apps/externalized-payloads/ following
      the same structure as apps/tuned/. This app demonstrates the best-practice pattern:

      - host.json with reduced concurrency settings:
        maxConcurrentActivityFunctions: 5
        maxConcurrentOrchestratorFunctions: 10
        controlQueueBufferThreshold: 32
        controlQueueBatchSize: 8
      - src/index.ts MUST follow the same startup pattern as apps/tuned/src/index.ts:
