  - id: T7
    title: Extend Terraform for new apps and storage
    description: |
      Add Terraform resources to infra/ for the two new function apps, matching ALL existing
      security and networking patterns. This is a security-sensitive task — every resource must
      replicate the existing posture exactly.

      Storage accounts (4 new):
      1. inline-payloads task hub storage
      2. externalized-payloads task hub storage
      3. inline-payloads workload blob storage
      4. externalized-payloads workload blob storage
      All storage accounts must have: shared_access_key_enabled = false,
      public_network_access_enabled = false, min_tls_version = "TLS1_2",
      default_to_oauth_authentication = true, allow_nested_items_to_be_public = false.

      Blob containers:
      - input + output on both workload storage accounts
      - intermediate-payloads container on externalized-payloads workload storage
        (used by BlobPayloadManager to stage externalized payloads between activities)

      Managed identities (2 new user-assigned):
      - id-{prefix}-inline for inline-payloads app
      - id-{prefix}-externalized for externalized-payloads app

      RBAC role assignments (per identity, matching existing pattern):
      - Task hub storage: Storage Blob Data Owner, Storage Queue Data Contributor,
        Storage Table Data Contributor
      - Workload blob storage: Storage Blob Data Contributor
      - Add both new identities to time_sleep.rbac_propagation depends_on

      Private networking:
      - 2 new delegated subnets (10.0.4.0/24 snet-inline, 10.0.5.0/24 snet-externalized)
        with Microsoft.Web/serverFarms delegation
      - Add new storage accounts to local.storage_private_endpoints map in network.tf:
        blob + queue + table PEs for both task hub accounts,
        blob PEs for both workload blob accounts
      - All PEs in existing snet-pe subnet with private DNS zone groups

      Function apps (2 new Linux Function Apps):
      Both must have: storage_uses_managed_identity = true, content_share_force_disabled = true,
      ftp_publish_basic_authentication_enabled = false,
      webdeploy_publish_basic_authentication_enabled = false,
      virtual_network_subnet_id pointing to respective subnet,
      UserAssigned identity, key_vault_reference_identity_id,
      vnet_route_all_enabled = true, AzureWebJobsStorage__credential = "managedidentity",
      AzureWebJobsStorage__clientId, AZURE_CLIENT_ID.
      - inline-payloads: APP_NAME = "inline-payloads", no special memory settings
      - externalized-payloads: APP_NAME = "externalized-payloads",
        INTERMEDIATE_PAYLOAD_CONTAINER = "intermediate-payloads"
      Both depend on time_sleep.rbac_propagation and azurerm_private_endpoint.storage.

      App Service plans (2 new P0v3):
      - plan-{prefix}-inline
      - plan-{prefix}-externalized

      Outputs: function app URLs, storage account names for new apps.
    execution_order: 3
    agent: gem-implementer
    priority: high
    status: pending
    depends_on: []
    context_files:
      - infra/main.tf: existing resource patterns — copy storage, identity, RBAC, function app blocks
      - infra/variables.tf: existing variables
      - infra/outputs.tf: existing outputs to extend
      - infra/network.tf: existing VNet, subnets, private endpoints, DNS zones to extend
    estimated_effort: large
    estimated_files: 3
    estimated_lines: 500
    focus_area: infra
    tech_stack:
      - Terraform >= 1.5
      - azurerm provider
    test_coverage: null
    verification:
      - terraform validate succeeds
      - terraform plan shows expected new resources
      - No conflicts with existing resource names
      - All new storage accounts have shared_access_key_enabled = false and public_network_access_enabled = false
      - All new function apps have storage_uses_managed_identity = true and VNet integration
      - Private endpoints created for all new storage accounts
      - RBAC role assignments cover blob, queue, and table for task hub storage
    acceptance_criteria:
      - 4 new storage accounts with identical security settings to existing (no shared keys, no public access, TLS 1.2, OAuth default)
      - 2 new user-assigned managed identities with correct RBAC role assignments
      - RBAC: Blob Data Owner + Queue Data Contributor + Table Data Contributor on task hub storage, Blob Data Contributor on workload storage
      - 2 new delegated subnets (10.0.4.0/24, 10.0.5.0/24) with Microsoft.Web delegation
      - Private endpoints for all new storage accounts (blob/queue/table for task hubs, blob for workload) in snet-pe
      - Private DNS zone group registration for all new PEs using existing DNS zones
      - 2 new P0v3 App Service plans
      - 2 new Linux Function Apps with managed identity auth, VNet integration, vnet_route_all, no FTP/WebDeploy basic auth
      - intermediate-payloads blob container on externalized-payloads workload storage
      - Both function apps depend on rbac_propagation and private_endpoint resources
      - New outputs for function app URLs and storage account names
    failure_modes:
      - scenario: Storage account name exceeds 24-character limit
        likelihood: medium
        impact: high
        mitigation: Use shorter suffixes (e.g., "iltask", "extask", "ilblob", "exblob") and verify name lengths
      - scenario: /24 subnet exhaustion in 10.0.0.0/16 address space
        likelihood: low
        impact: medium
        mitigation: Current subnets use 10.0.0.0-10.0.3.0; new subnets at 10.0.4.0 and 10.0.5.0 are safe
      - scenario: Private endpoint limit reached in snet-pe subnet
        likelihood: low
        impact: high
        mitigation: /24 supports 251 usable IPs; existing PEs use ~11, new PEs add ~8 — well within limit
    requires_review: true
    review_depth: full
    security_sensitive: true

