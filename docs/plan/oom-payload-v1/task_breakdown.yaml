plan_id: oom-payload-v1
objective: |
  Add a second pair of Durable Function apps (inline-payloads vs externalized-payloads) that
  demonstrate the OOM anti-pattern of passing large payloads inline through the Durable Task
  framework versus the best-practice pattern of externalizing payloads to Blob Storage and
  passing only references. The problematic app reproduces the customer scenario — memory
  pressure visible in telemetry under moderate concurrency. The remediated app uses blob URI
  references, lower concurrency limits, and continueAsNew for long-running orchestrations.
created_at: "2026-05-08"
created_by: requirements-planner
status: approved
research_confidence: high

tldr: |
  Two new apps — inline-payloads (anti-pattern) and externalized-payloads (best practice).
  New shared-oom package with 3 activities (dataEnricher, expressionResolver, dataTransformer)
  that process large payloads (200KB-1.6MB). The inline app passes full payloads through
  orchestration I/O; the externalized app stores payloads in blobs and passes only URIs.
  Custom telemetry tracks heap memory usage. The externalized app also demonstrates
  continueAsNew to cap orchestration history size. Extends existing Terraform for 2
  additional function apps + storage accounts. Pre-seeded large test blobs for load testing.

requirements_summary: |
  1. Two new Azure Durable Function apps (Node.js 20, v4 model) under apps/inline-payloads
     and apps/externalized-payloads
  2. New shared package (packages/shared-oom) with 3 activities modeled after the customer
     pattern: dataEnricher, expressionResolver, dataTransformer
  3. The inline-payloads app passes full payload data (200KB-1.6MB JSON) inline as activity
     inputs and outputs through the Durable Task framework — reproducing the OOM anti-pattern
  4. The externalized-payloads app stores intermediate payloads in Blob Storage and passes
     only blob URIs as activity inputs/outputs — the recommended best practice
  5. Custom telemetry emits process.memoryUsage() (heapUsed, heapTotal, rss) as custom
     metrics after every activity execution, enabling visibility into memory pressure
  6. The externalized-payloads app uses continueAsNew in a sub-orchestrator to batch items
     and periodically reset orchestration history, preventing unbounded event accumulation
  7. The inline-payloads app uses high concurrency defaults (40/40) to allow memory buildup;
     the externalized-payloads app uses reduced concurrency limits (10 orchestrator, 5 activity)
  8. Pre-seeded large JSON blobs (200KB-1.6MB range) in workload storage for realistic testing
  9. Both apps share the same Application Insights instance with distinct cloud_RoleName
  10. Extend existing Terraform to provision 2 additional function apps + storage accounts
  11. New KQL queries for memory-focused analysis (heap usage trends, OOM correlation)
  12. Update load test plan with thread groups targeting the new apps

open_questions: []

risk_assessment:
  overall_risk_level: medium
  critical_risks:
    - scenario: Large inline payloads may not cause visible memory pressure on EP3 (14GB) with moderate load
      likelihood: medium
      impact: high
      mitigation: |
        Seed blobs at the upper end of the range (1-1.6MB) and run at concurrency 20-40 to
        multiply heap consumption. Add configurable payload multiplier to inflate in activities.
    - scenario: continueAsNew sub-orchestrator pattern adds complexity and may confuse demo audience
      likelihood: low
      impact: medium
      mitigation: |
        Keep the sub-orchestrator simple — process N items then continueAsNew. Document the
        pattern clearly in the README and comparison methodology.
    - scenario: Existing Terraform state may conflict when adding new resources
      likelihood: low
      impact: medium
      mitigation: |
        Use consistent naming conventions. New resources follow same pattern as existing ones.
        Test with terraform plan before apply.
    - scenario: Blob payload externalization adds latency that muddies the comparison
      likelihood: medium
      impact: low
      mitigation: |
        The point is showing stability vs instability, not raw speed. Document that the
        externalized approach trades minimal latency for dramatically better memory behavior.
  assumptions:
    - User has the existing infrastructure deployed or can deploy alongside
    - EP3 (14GB) is sufficient to show memory pressure with 40 concurrent activities processing 1MB+ payloads
    - The existing shared Application Insights instance can handle telemetry from 4 apps
    - Large blob seeding (seed-data-oom.sh) runs once before load testing
  constraints:
    - Must follow existing monorepo patterns (npm workspaces, shared packages)
    - New apps must not interfere with existing baseline/tuned apps
    - Maximum estimated files per task is 3, maximum lines changed per task is 500
    - Both new apps must share identical core activity logic via packages/shared-oom

implementation_specification:
  code_structure: |
    New shared package packages/shared-oom contains the 3 activity functions (dataEnricher,
    expressionResolver, dataTransformer), two orchestrator variants (inline vs externalized),
    telemetry helpers with memory tracking, and type definitions. Each new app (apps/inline-payloads,
    apps/externalized-payloads) is a thin wrapper that imports from shared-oom and provides its
    own host.json + local.settings.json. The inline orchestrator passes full data inline; the
    externalized orchestrator wraps/unwraps payloads via blob storage. The externalized app also
    includes a sub-orchestrator that uses continueAsNew for batch processing.
  affected_areas:
    - packages/shared-oom/ — new shared package with activities, orchestrators, telemetry
    - apps/inline-payloads/ — new function app reproducing OOM anti-pattern
    - apps/externalized-payloads/ — new function app demonstrating best practices
    - infra/ — extend Terraform with 2 more function apps, 2 more storage accounts
    - loadtest/ — seed script for large blobs, load test targeting new apps
    - analytics/ — KQL queries for memory pressure analysis
    - docs/ — updated README, comparison methodology, new scenario documentation
    - package.json — register new workspaces
  component_details:
    - component: packages/shared-oom
      responsibility: |
        Contains 3 activity functions (dataEnricher, expressionResolver, dataTransformer),
        two orchestrator variants, a blob payload manager (for externalization), telemetry
        helpers with memory usage tracking, and shared type definitions.
      interfaces:
        - "dataEnricher(input): Promise<EnrichedData> — enriches raw data with additional fields"
        - "expressionResolver(input): Promise<ResolvedData> — evaluates and resolves expression fields"
        - "dataTransformer(input): Promise<TransformedData> — transforms data to output format"
        - "inlineOrchestrator(context): Generator — passes full payloads inline"
        - "externalizedOrchestrator(context): Generator — passes blob URIs, uses continueAsNew"
        - "BlobPayloadManager.store(data): Promise<string> — stores payload, returns URI"
        - "BlobPayloadManager.retrieve(uri): Promise<unknown> — retrieves payload from blob"
        - "recordMemoryUsage(telemetry, activityName): void — emits heap metrics"
    - component: apps/inline-payloads
      responsibility: |
        Function app with default concurrency (40/40). Registers orchestrator that passes full
        data payloads inline through activity inputs/outputs. Demonstrates the OOM anti-pattern.
      interfaces:
        - "POST /api/orchestrators/{orchestratorName} — starts inline orchestration"
    - component: apps/externalized-payloads
      responsibility: |
        Function app with reduced concurrency (10/5). Registers orchestrator that externalizes
        payloads to blob storage. Includes sub-orchestrator with continueAsNew for batch processing.
      interfaces:
        - "POST /api/orchestrators/{orchestratorName} — starts externalized orchestration"
  dependencies:
    - component: apps/inline-payloads
      relationship: imports activity logic and telemetry from packages/shared-oom
    - component: apps/externalized-payloads
      relationship: imports activity logic, blob payload manager, and telemetry from packages/shared-oom
    - component: loadtest
      relationship: targets HTTP endpoints from both new apps
    - component: analytics
      relationship: queries memory telemetry schema defined in packages/shared-oom
  integration_points:
    - Both new function apps → shared Application Insights instance
    - Inline-payloads activities → inline-payloads Blob Storage (workload I/O)
    - Externalized-payloads activities → externalized-payloads Blob Storage (workload + payload staging)
    - Externalized-payloads → intermediate blob container for payload externalization
    - Azure Load Testing → both new function app HTTP endpoints
    - KQL memory queries → Application Insights / Log Analytics workspace

