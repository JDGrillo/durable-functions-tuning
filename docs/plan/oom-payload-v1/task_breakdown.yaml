  - id: T1
    title: Scaffold packages/shared-oom package with types
    description: |
      Create the packages/shared-oom package with TypeScript configuration, package.json
      (mirroring packages/shared structure), and type definitions for the new activity chain.
      Types include: EnricherInput/Output, ResolverInput/Output, TransformerInput/Output,
      OomOrchestratorInput/Output, BlobReference (uri, container, blobName, sizeBytes).
      Also update the root package.json to register the new workspace.
    execution_order: 1
    agent: gem-implementer
    priority: high
    status: pending
    depends_on: []
    context_files:
      - packages/shared/package.json: reference for package structure
      - packages/shared/tsconfig.json: reference for TS config
      - packages/shared/src/types.ts: reference for type patterns
      - package.json: root workspace config to update
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 180
    focus_area: packages/shared-oom
    tech_stack:
      - TypeScript 5.x
      - Node.js 20
    test_coverage: null
    verification:
      - npm install succeeds at root level with new workspace
      - tsc --noEmit passes on packages/shared-oom
    acceptance_criteria:
      - packages/shared-oom/package.json exists with correct name and dependencies
      - packages/shared-oom/tsconfig.json configured with correct paths
      - Type definitions cover all 3 activities (input/output) plus orchestrator types
      - BlobReference type defined for payload externalization
      - Root package.json includes packages/shared-oom in workspaces
    failure_modes:
      - scenario: Package naming conflicts with existing shared package
        likelihood: low
        impact: medium
        mitigation: Use @df-comparison/shared-oom as the package name (matching @df-comparison/shared pattern)
    requires_review: false
    review_depth: null
    security_sensitive: false

  - id: T2
    title: Implement 3 activity functions and BlobPayloadManager
    description: |
      Implement the core activity functions in packages/shared-oom/src/activities/:
      1. dataEnricher — reads input data, adds enrichment fields (timestamps, computed fields,
         cross-references), increasing payload size by ~50%. Accepts either inline data or blob URI.
      2. expressionResolver — iterates over expression fields in the data, resolves/evaluates them,
         produces resolved output. Payload size stays roughly the same or grows slightly.
      3. dataTransformer — transforms data to final output format, re-serializes as JSON.

      Also implement BlobPayloadManager in packages/shared-oom/src/blobPayloadManager.ts:
      - store(data, containerClient, instanceId): serializes to JSON, uploads to blob, returns BlobReference
      - retrieve(ref, containerClient): downloads blob, deserializes, returns data
      Used by the externalized orchestrator to wrap/unwrap payloads between activities.
    execution_order: 2
    agent: gem-implementer
    priority: high
    status: pending
    depends_on: [T1]
    context_files:
      - packages/shared/src/activities/: reference for activity patterns
      - packages/shared/src/blobClient.ts: reference for blob client patterns
      - packages/shared-oom/src/types.ts: type definitions from T1
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 350
    focus_area: packages/shared-oom/src/activities
    tech_stack:
      - TypeScript 5.x
      - "@azure/storage-blob"
      - "@azure/functions"
    test_coverage: null
    verification:
      - tsc --noEmit passes
      - Activities accept typed inputs and return typed outputs
      - BlobPayloadManager store/retrieve round-trips data correctly
    acceptance_criteria:
      - dataEnricher enriches input data and increases payload size
      - expressionResolver processes expression fields in the data
      - dataTransformer transforms data to output format
      - BlobPayloadManager.store() uploads JSON to blob and returns BlobReference
      - BlobPayloadManager.retrieve() downloads and deserializes blob data
      - All activities accept both inline data and blob URI reference inputs
    failure_modes:
      - scenario: Blob operations fail due to missing container
        likelihood: medium
        impact: medium
        mitigation: BlobPayloadManager creates container if not exists on first store()

  - id: T3
    title: Implement inline and externalized orchestrators
    description: |
      Implement two orchestrator variants in packages/shared-oom/src/orchestrator/:

      1. inlineOrchestrator — chains dataEnricher → expressionResolver → dataTransformer,
         passing full payload data inline as activity inputs/outputs. This is the anti-pattern
         that causes OOM under load. Each activity receives the full data object, processes it,
         and returns the full result inline. With 200KB-1.6MB payloads, each orchestration holds
         3x the payload in its history for replay.

      2. externalizedOrchestrator — same 3-activity chain but wraps payloads:
         - Before calling each activity, stores input payload in blob via BlobPayloadManager
         - Passes only the BlobReference (URI + metadata, ~200 bytes) as the activity input
         - Activity retrieves payload from blob, processes, stores result back to blob
         - Returns BlobReference as output
         - Includes a sub-orchestrator pattern with continueAsNew that processes items in batches
           (e.g., 10 items per batch), then calls continueAsNew to reset history

      Both orchestrators implement the same business logic; only the data-passing pattern differs.
    execution_order: 3
    agent: gem-implementer
    priority: high
    status: pending
    depends_on: [T1, T2]
    context_files:
      - packages/shared/src/orchestrator/blobProcessingOrchestrator.ts: reference for orchestrator pattern
      - packages/shared-oom/src/activities/: activities from T2
      - packages/shared-oom/src/blobPayloadManager.ts: BlobPayloadManager from T2
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 300
    focus_area: packages/shared-oom/src/orchestrator
    tech_stack:
      - TypeScript 5.x
      - durable-functions SDK
    test_coverage: null
    verification:
      - tsc --noEmit passes
      - Inline orchestrator passes full payloads as activity inputs/outputs
      - Externalized orchestrator passes only BlobReference objects as activity inputs/outputs
      - continueAsNew sub-orchestrator resets history after processing batch
    acceptance_criteria:
      - inlineOrchestrator chains 3 activities with full data inline
      - externalizedOrchestrator chains 3 activities with blob URI references only
      - externalizedOrchestrator includes sub-orchestrator with continueAsNew for batched processing
      - Both orchestrators produce equivalent final results
      - Orchestration history size dramatically differs between the two approaches
    failure_modes:
      - scenario: continueAsNew loses state between iterations
        likelihood: medium
        impact: high
        mitigation: |
          Pass continuation token and processed count as input to continueAsNew.
          Track batch progress in the orchestrator input, not in local variables.

  - id: T4
    title: Add telemetry with memory usage tracking
    description: |
      Implement telemetry instrumentation in packages/shared-oom/src/telemetry/ that replicates
      ALL existing telemetry patterns from packages/shared/src/telemetry/ and adds memory-specific
      tracking. The new telemetry module must be a superset of the existing one.

      Setup (packages/shared-oom/src/telemetry/setup.ts):
      - initializeTelemetry() function matching packages/shared pattern exactly:
        - Sets process.env.OTEL_SERVICE_NAME and OTEL_RESOURCE_ATTRIBUTES (cloud.role.name)
        - Calls useAzureMonitor() from applicationinsights SDK with:
          - connectionString from config
          - samplingRatio: 1 (100% — no sampling)
          - tracesPerSecond: 0 (disable RateLimitedSampler)
        - Idempotent (safe to call multiple times, subsequent calls are no-ops)
      - TelemetrySetupConfig accepts appName: "inline-payloads" | "externalized-payloads"

      TelemetryHelper class (packages/shared-oom/src/telemetry/telemetryHelper.ts):
      Must include ALL 6 existing instruments from packages/shared plus new memory/payload ones:

      Existing instruments (MUST replicate):
      - df.activity.duration — Histogram (ms) — activity execution duration
      - df.activity.queue_delay — Histogram (ms) — time between scheduled and started
      - df.orchestration.duration — Histogram (ms) — total orchestration duration
      - df.activity.completed — Counter — completed activity executions
      - df.orchestration.completed — Counter — completed orchestrations
      - df.orchestration.failed — Counter — failed orchestrations

      Existing methods (MUST replicate):
      - createActivitySpan(activityName, instanceId) — span with df.app_name, df.activity_name,
        df.orchestration_instance_id, df.function_type, cloud.role_name attributes
      - recordActivityCompletion(span, activityName, durationMs, additionalAttributes)
      - recordActivityFailure(span, activityName, error)
      - recordQueueDelay(activityName, scheduledTime, startTime)
      - createOrchestrationSpan(orchestrationName, instanceId)
      - recordOrchestrationCompletion(span, durationMs, activitiesCompleted)
      - recordOrchestrationFailure(span, error)

      NEW memory instruments (additions for OOM scenario):
      - df.memory.heap_used_mb — Histogram — heapUsed from process.memoryUsage()
      - df.memory.heap_total_mb — Histogram — heapTotal from process.memoryUsage()
      - df.memory.rss_mb — Histogram — rss from process.memoryUsage()
      - df.memory.external_mb — Histogram — external from process.memoryUsage()

      NEW payload instruments:
      - df.payload.input_bytes — Histogram — size of activity input in bytes
      - df.payload.output_bytes — Histogram — size of activity output in bytes
      Dimension: df.payload_is_externalized ("true" | "false")

      NEW method:
      - recordMemoryAndPayload(activityName, inputSizeBytes, outputSizeBytes, isExternalized)
        Records process.memoryUsage() and payload sizes after each activity execution

      Factory: createTelemetryHelper(appName: "inline-payloads" | "externalized-payloads")

      Instrumented wrappers (packages/shared-oom/src/telemetry/instrumentedActivities.ts):
      - instrumentedDataEnricher, instrumentedExpressionResolver, instrumentedDataTransformer
      - Each wrapper must: create activity span, record queue delay from _scheduledTimeUtc,
        call the raw activity, record completion with duration, record memory and payload sizes,
        handle failures with recordActivityFailure
      - Pattern must match packages/shared/src/telemetry/instrumentedActivities.ts exactly

      Instrumented orchestrators (packages/shared-oom/src/telemetry/instrumentedOrchestrator.ts):
      - createInstrumentedInlineOrchestrator(telemetry) — wraps inline orchestrator
      - createInstrumentedExternalizedOrchestrator(telemetry) — wraps externalized orchestrator
      - Both must use context.df.isReplaying guard to prevent duplicate spans/metrics
      - Pattern must match packages/shared/src/telemetry/instrumentedOrchestrator.ts

      Index barrel (packages/shared-oom/src/telemetry/index.ts):
      - Export all: TelemetryHelper, createTelemetryHelper, initializeTelemetry,
        all instrumented wrappers, type exports
    execution_order: 3
    agent: gem-implementer
    priority: high
    status: pending
    depends_on: [T1, T2]
    context_files:
      - packages/shared/src/telemetry/setup.ts: MUST replicate initializeTelemetry pattern (useAzureMonitor, samplingRatio, tracesPerSecond)
      - packages/shared/src/telemetry/telemetryHelper.ts: MUST replicate all 6 instruments + all methods
      - packages/shared/src/telemetry/instrumentedActivities.ts: MUST replicate wrapper pattern (span, queue delay, completion, failure)
      - packages/shared/src/telemetry/instrumentedOrchestrator.ts: MUST replicate isReplaying guard pattern
      - packages/shared/src/telemetry/index.ts: MUST replicate barrel export pattern
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 500
    focus_area: packages/shared-oom/src/telemetry
    tech_stack:
      - TypeScript 5.x
      - "@opentelemetry/api"
      - applicationinsights (v3 — useAzureMonitor)
    test_coverage: null
    verification:
      - tsc --noEmit passes
      - initializeTelemetry sets OTEL_SERVICE_NAME and calls useAzureMonitor with samplingRatio 1 and tracesPerSecond 0
      - All 6 existing metric instruments are created (3 histograms + 3 counters)
      - All 6 new metric instruments are created (4 memory histograms + 2 payload histograms)
      - Activity spans include all existing attributes (df.app_name, df.activity_name, df.orchestration_instance_id, df.function_type, cloud.role_name)
      - Memory metrics are emitted after each activity execution
      - Payload size metrics track inline vs externalized accurately
      - cloud_RoleName correctly identifies which app emitted each trace
      - Orchestrator wrappers use isReplaying guard
      - Barrel index exports all public symbols
    acceptance_criteria:
      - initializeTelemetry() replicates exact setup from packages/shared (useAzureMonitor, OTEL env vars, idempotent)
      - TelemetryHelper includes all 6 existing instruments (df.activity.duration, df.activity.queue_delay, df.orchestration.duration, df.activity.completed, df.orchestration.completed, df.orchestration.failed)
      - TelemetryHelper includes all 6 new instruments (df.memory.heap_used_mb/heap_total_mb/rss_mb/external_mb, df.payload.input_bytes/output_bytes)
      - All existing methods replicated (createActivitySpan, recordActivityCompletion, recordActivityFailure, recordQueueDelay, createOrchestrationSpan, recordOrchestrationCompletion, recordOrchestrationFailure)
      - recordMemoryAndPayload method records process.memoryUsage() and payload sizes
      - Instrumented wrappers for all 3 activities follow same pattern as instrumentedActivities.ts
      - Instrumented orchestrator wrappers use isReplaying guard matching instrumentedOrchestrator.ts
      - createTelemetryHelper factory typed to "inline-payloads" | "externalized-payloads"
      - Barrel index exports match packages/shared/src/telemetry/index.ts pattern
    failure_modes:
      - scenario: Memory metrics distorted by garbage collection timing
        likelihood: medium
        impact: low
        mitigation: Record metrics immediately after activity completes, document that GC may affect readings
      - scenario: Missing an existing instrument causes KQL queries to return no data for new apps
        likelihood: medium
        impact: high
        mitigation: Cross-reference every instrument and method from telemetryHelper.ts — the description above enumerates all 6 existing ones explicitly

  - id: T5
    title: Create apps/inline-payloads function app
    description: |
      Create the inline-payloads function app under apps/inline-payloads/ following the same
