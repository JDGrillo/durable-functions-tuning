tasks:
  # ─── RESEARCH ───────────────────────────────────────────────
  - id: T1
    title: Research Durable Functions v4 tuning and OpenTelemetry integration
    description: |
      Research the following areas and produce a findings document:
      1. Azure Durable Functions Node.js v4 programming model — current SDK versions,
         Azure Storage provider configuration options, known limitations
      2. host.json tuning parameters for durableTask/storageProvider: maxConcurrentActivityFunctions,
         maxConcurrentOrchestratorFunctions, controlQueueBatchSize, partitionCount,
         controlQueueBufferThreshold, trackingStoreNamePrefix
      3. App-level tuning: FUNCTIONS_WORKER_PROCESS_COUNT, NODE_OPTIONS (max-old-space-size),
         WEBSITE_MAX_DYNAMIC_APPLICATION_SCALE_OUT
      4. EP3 scaling config: always-ready instances, max burst, pre-warmed instance count
      5. OpenTelemetry integration with Azure Functions Node.js v4: @opentelemetry/api usage,
         custom spans on activity/orchestrator functions, metric instruments, correlation ID propagation
      6. Azure Storage Blob SDK best practices for I/O-bound workloads (connection pooling, retry policies)
    execution_order: 1
    agent: gem-researcher
    priority: high
    status: completed
    depends_on: []
    context_files:
      - "Microsoft docs: Durable Functions host.json reference": https://learn.microsoft.com/en-us/azure/azure-functions/durable/durable-functions-bindings
      - "Microsoft docs: Azure Functions Node.js v4": https://learn.microsoft.com/en-us/azure/azure-functions/functions-reference-node
    estimated_effort: medium
    estimated_files: 1
    estimated_lines: 0
    focus_area: Durable Functions v4 + OpenTelemetry + host.json tuning
    verification:
      - Research document covers all 6 areas listed in description
      - Specific version numbers and SDK package names are identified
      - Tuning parameter ranges and recommendations are documented
    acceptance_criteria:
      - Findings YAML produced with concrete SDK versions, parameter names, and recommended values
      - OpenTelemetry integration approach validated against current SDK compatibility
      - Any open questions or risks flagged for planner review
    failure_modes:
      - scenario: OpenTelemetry auto-instrumentation conflicts with Durable Functions replay logic
        likelihood: medium
        impact: high
        mitigation: Document workaround using manual spans that check isReplaying flag
    tech_stack:
      - durable-functions (npm)
      - "@azure/functions v4"
      - "@opentelemetry/api"
      - "@azure/storage-blob"

  # ─── SCAFFOLD ───────────────────────────────────────────────
  - id: T2
    title: Scaffold monorepo structure with npm workspaces
    description: |
      Create the monorepo workspace structure:
      - Root package.json with npm workspaces pointing to apps/* and packages/*
      - Root tsconfig.json with project references
      - packages/shared/ — TypeScript package skeleton (package.json, tsconfig.json, src/index.ts)
      - apps/baseline/ — Azure Functions v4 app skeleton (package.json, tsconfig.json, host.json, local.settings.json.example)
      - apps/tuned/ — same skeleton as baseline
      - infra/ — empty Terraform directory structure (main.tf, variables.tf, outputs.tf, providers.tf)
      - loadtest/ — empty directory for JMeter plan
      - analytics/ — empty directory for KQL queries
      - .gitignore, .nvmrc (Node 20), .editorconfig
    execution_order: 1
    agent: gem-implementer
    priority: high
    status: completed
    depends_on: []
    context_files: {}
    estimated_effort: medium
    estimated_files: 15
    estimated_lines: 300
    focus_area: project scaffolding
    verification:
      - npm install succeeds at root level
      - TypeScript compiles with no errors across all workspaces
      - apps/baseline and apps/tuned both reference packages/shared
    acceptance_criteria:
      - npm workspaces resolve correctly (npm ls shows shared package linked)
      - tsconfig project references build without errors
      - Both app skeletons can start locally (even with no functions registered yet)
    failure_modes:
      - scenario: npm workspace resolution fails with symlink issues on Windows
        likelihood: low
        impact: medium
        mitigation: Use explicit file references in package.json if workspaces fail
    tech_stack:
      - Node.js 20
      - TypeScript 5.x
      - npm workspaces
      - Azure Functions Core Tools v4
    test_coverage: null

  # ─── SHARED BUSINESS LOGIC ─────────────────────────────────
  - id: T3
    title: Implement orchestrator and 3 Blob Storage activity functions
    description: |
      In packages/shared, implement:
      1. activity1BlobRead — reads a blob from a configurable container/path, returns content + metadata
      2. activity2BlobTransform — receives blob content, performs a transformation (e.g., JSON parse,
         field mapping, data enrichment), returns transformed result
      3. activity3BlobWrite — writes the transformed result to an output container/path, returns write confirmation
      4. orchestrator — calls the 3 activities sequentially, passing output of each as input to the next
      5. Types/interfaces for activity inputs/outputs
      All functions must accept configuration (storage connection string, container names) via input parameters.
      Activities must be pure functions of their inputs (no side effects beyond blob I/O) to ensure
      identical behavior in both apps.
    execution_order: 2
    agent: gem-implementer
    priority: high
    status: completed
    depends_on: [T1, T2]
    context_files:
      - "packages/shared/src/index.ts": skeleton from T2
    estimated_effort: medium
    estimated_files: 6
    estimated_lines: 400
    focus_area: business logic
    verification:
      - Unit tests pass for each activity function (mocked Blob Storage)
      - Orchestrator correctly chains activities sequentially
      - TypeScript compiles with strict mode
    acceptance_criteria:
      - Each activity performs a distinct Blob Storage operation (read, transform, write)
      - Orchestrator calls all 3 activities in sequence and propagates context
      - All functions are exported and consumable from both app packages
      - Error handling follows Azure Functions best practices (retryable vs terminal errors)
    failure_modes:
      - scenario: Blob Storage SDK connection pooling causes memory leaks under high concurrency
        likelihood: low
        impact: high
        mitigation: Use singleton BlobServiceClient with connection pooling; document cleanup
    tech_stack:
      - "@azure/storage-blob"
      - durable-functions
      - "@azure/functions v4"
      - TypeScript
    test_coverage: Unit tests with mocked Blob SDK for all 3 activities + orchestrator

  # ─── TELEMETRY INSTRUMENTATION ──────────────────────────────
  - id: T4
    title: Implement custom OpenTelemetry instrumentation layer
    description: |
      In packages/shared, implement a telemetry module:
      1. TelemetryHelper class/factory that wraps @opentelemetry/api:
         - createActivitySpan(activityName, parentContext) — creates a custom span for each activity
         - recordActivityDuration(activityName, durationMs) — records histogram metric
         - setCorrelationId(span, orchestrationInstanceId) — attaches correlation dimensions
         - recordQueueDelay(activityName, scheduledTime, startTime) — measures queue wait time
      2. Orchestrator instrumentation wrapper:
         - Creates parent span for entire orchestration
         - Tracks total orchestration duration
         - Records number of activities completed
         - CRITICAL: Must handle Durable Functions replay — only emit telemetry on non-replay executions
      3. Activity instrumentation wrapper:
         - Wraps each activity call with start/end spans
         - Records custom dimensions: appName (baseline|tuned), activityName, orchestrationInstanceId,
           blobSize, operationType (read|transform|write)
         - Records timing metrics: execution duration, blob SDK latency
      4. Configuration: accepts App Insights connection string, app name tag (for cloud_RoleName differentiation)
    execution_order: 2
    agent: gem-implementer
    priority: high
    status: completed
    depends_on: [T1, T2]
    context_files:
      - "packages/shared/src/index.ts": skeleton from T2
      - "T1 research findings": OpenTelemetry + DF replay handling approach
    estimated_effort: large
    estimated_files: 4
    estimated_lines: 450
    focus_area: observability
    verification:
      - Custom spans appear in local App Insights emulator or debug logs
      - Replay detection correctly suppresses duplicate telemetry
      - cloud_RoleName correctly differentiates baseline vs tuned
      - Correlation IDs propagate through orchestrator → activity chain
    acceptance_criteria:
      - Every function execution produces a custom span with all required dimensions
      - Histogram metrics recorded for activity duration and queue delay
      - Replay-safe — no duplicate telemetry from orchestrator replays
      - cloud_RoleName set per-app for filtering in shared App Insights
    failure_modes:
      - scenario: Orchestrator replay causes duplicate spans in App Insights
        likelihood: high
        impact: high
        mitigation: Check context.df.isReplaying before emitting any telemetry; wrap in guard
      - scenario: OpenTelemetry SDK conflicts with built-in Azure Functions telemetry
        likelihood: medium
        impact: medium
        mitigation: Use manual instrumentation via @opentelemetry/api tracer; avoid auto-instrumentation
    tech_stack:
      - "@opentelemetry/api"
      - "@opentelemetry/sdk-trace-node"
      - "@opentelemetry/sdk-metrics"
      - "@azure/monitor-opentelemetry-exporter"
      - TypeScript
    test_coverage: Unit tests validating span creation, replay guard, metric recording

  # ─── BASELINE APP ──────────────────────────────────────────
  - id: T5
    title: Wire baseline function app with default configuration
    description: |
      In apps/baseline/:
      1. Register orchestrator and all 3 activities from packages/shared using Azure Functions v4 registration
      2. Create HTTP-triggered starter function (httpStart) that starts the orchestration
         and returns the standard Durable Functions status URLs
      3. Initialize telemetry helper with appName="baseline"
      4. host.json: use default Azure Functions + Durable Functions configuration (no tuning)
      5. local.settings.json.example: document required app settings
         (AzureWebJobsStorage, APPLICATIONINSIGHTS_CONNECTION_STRING, BLOB_STORAGE_CONNECTION_STRING)
      6. Ensure the app starts and runs locally with Azure Functions Core Tools
    execution_order: 3
    agent: gem-implementer
    priority: high
    status: completed
    depends_on: [T3, T4]
    context_files:
      - "packages/shared/src/": activity and orchestrator implementations
      - "apps/baseline/host.json": default config
    estimated_effort: small
    estimated_files: 4
    estimated_lines: 150
    focus_area: app integration
    verification:
      - func start runs without errors
      - HTTP trigger returns orchestration status URLs
      - Orchestration completes end-to-end locally with Azurite
      - Custom telemetry appears in console/debug output
    acceptance_criteria:
      - All functions registered and discoverable by runtime
      - host.json contains only default/minimal configuration
      - HTTP starter returns proper Durable Functions management URLs
      - App can run locally with Azurite for storage emulation
    failure_modes:
      - scenario: Shared package import fails at runtime due to ESM/CJS module resolution
        likelihood: medium
        impact: high
        mitigation: Ensure consistent module format (ESM) across workspace; validate with local run
    tech_stack:
      - "@azure/functions v4"
      - durable-functions
      - Azure Functions Core Tools
    test_coverage: Integration test — start orchestration via HTTP, verify completion

  # ─── TUNED APP ──────────────────────────────────────────────
  - id: T6
    title: Wire tuned function app with optimized configuration
    description: |
      In apps/tuned/:
      1. Same function registrations as baseline (from packages/shared)
      2. Initialize telemetry helper with appName="tuned"
      3. host.json — tuned durableTask section:
         - maxConcurrentActivityFunctions: increased (e.g., 20+, based on EP3 capacity)
         - maxConcurrentOrchestratorFunctions: increased
         - controlQueueBatchSize: increased
         - partitionCount: optimized for EP3
         - extendedSessionsEnabled: true
         - extendedSessionIdleTimeoutInSeconds: tuned
      4. App settings for tuned deployment:
         - FUNCTIONS_WORKER_PROCESS_COUNT: >1 if beneficial for Node.js
         - NODE_OPTIONS: --max-old-space-size appropriate for EP3 14GB
      5. Elastic Premium scaling config (documented for Terraform):
         - always_ready_instance_count: set based on expected baseline load
         - maximum_scale_out_limit: set for burst capacity
         - pre_warmed_instance_count: configured
      6. Document each tuning parameter with rationale in comments
    execution_order: 3
    agent: gem-implementer
    priority: high
    status: completed
    depends_on: [T1, T3, T4]
    context_files:
      - "T1 research findings": tuning parameter recommendations
      - "apps/baseline/": reference implementation for same structure
    estimated_effort: medium
    estimated_files: 4
    estimated_lines: 200
    focus_area: performance tuning
    verification:
      - func start runs without errors
      - host.json validates against schema
      - All tuning parameters are documented with rationale
      - App runs identically to baseline (same logic, different config)
    acceptance_criteria:
      - host.json contains documented tuning parameters with rationale comments
      - App settings file documents all tuning-related environment variables
      - Elastic Premium scaling parameters documented for Terraform consumption
      - App produces same orchestration results as baseline with different performance characteristics
    failure_modes:
      - scenario: Over-aggressive concurrency settings cause storage throttling
        likelihood: medium
        impact: medium
        mitigation: Start with moderate increases; include throttling detection in telemetry
    tech_stack:
      - "@azure/functions v4"
      - durable-functions
      - Azure Functions Core Tools
    test_coverage: Integration test — same as baseline, validates identical outputs

  # ─── TERRAFORM ──────────────────────────────────────────────
  - id: T7
    title: Provision Azure infrastructure with Terraform
    description: |
      Create Terraform configuration in infra/ to provision:
      1. Resource Group
      2. Log Analytics Workspace
      3. Application Insights (shared, connected to Log Analytics) with workspace-based mode
      4. Storage Account — baseline task hub (Tables + Queues for Durable Functions)
      5. Storage Account — tuned task hub (separate to avoid cross-contamination)
      6. Storage Account — baseline workload blobs (I/O target for baseline activities)
      7. Storage Account — tuned workload blobs (I/O target for tuned activities)
      8. Elastic Premium EP3 App Service Plan — baseline
      9. Elastic Premium EP3 App Service Plan — tuned
      10. Function App — baseline (linked to baseline plan, baseline storage accounts, shared App Insights)
         - Default scaling settings
      11. Function App — tuned (linked to tuned plan, tuned storage accounts, shared App Insights)
          - always_ready_instance_count, maximum_scale_out_limit, pre_warmed_instance_count configured
      12. Azure Load Testing resource
      12. Variables: resource prefix, location, EP3 config, scaling params
      13. Outputs: function app URLs, App Insights connection string, storage connection strings, load test resource ID
      Use azurerm provider. Follow Terraform best practices (modules for reusable components).
    execution_order: 2
    agent: gem-implementer
    priority: high
    status: completed
    depends_on: [T1]
    context_files:
      - "T1 research findings": EP3 scaling parameters, storage provider requirements
    estimated_effort: large
    estimated_files: 8
    estimated_lines: 500
    focus_area: infrastructure
    verification:
      - terraform validate passes
      - terraform plan shows expected resources (no errors)
      - All outputs defined and referenced correctly
      - Security best practices (no hardcoded secrets, managed identities where possible)
    acceptance_criteria:
      - All 12 resources provisionable with terraform apply
      - Baseline and tuned function apps have fully isolated storage (task hub + workload blobs)
      - Shared App Insights instance receives telemetry from both apps
      - EP3 scaling parameters configurable via variables
      - Azure Load Testing resource provisioned and accessible
    failure_modes:
      - scenario: EP3 SKU not available in selected region
        likelihood: low
        impact: high
        mitigation: Default to eastus2; document alternative regions in variables
      - scenario: Terraform azurerm provider version incompatibility with ALT resource
        likelihood: low
        impact: medium
        mitigation: Pin provider version; verify ALT support in chosen version
    tech_stack:
      - Terraform
      - azurerm provider
    requires_review: true
    review_depth: full
    security_sensitive: true

  # ─── LOAD TESTING ──────────────────────────────────────────
  - id: T8
    title: Create Azure Load Testing configuration and JMeter plan
    description: |
      In loadtest/:
      1. JMeter test plan (.jmx) that:
         - Targets both function app HTTP starter endpoints
         - Sends POST requests to start orchestrations
         - Configurable: number of threads (concurrent users), ramp-up period, duration
         - Parameterized: target URLs, request body (blob paths, etc.)
         - Records response times for orchestration start
      2. Azure Load Testing config file (loadtest.config.yaml):
         - References the JMeter plan
         - Defines test parameters (URLs injected from Terraform outputs)
         - Engine instance count for distributed load
      3. Helper script or documentation for:
         - Uploading test plan to Azure Load Testing
         - Running tests via Azure CLI
         - Manual HTTP trigger examples (curl/PowerShell) for ad-hoc testing
      4. Seed data script: creates identical test blobs in both workload storage accounts
    execution_order: 4
    agent: gem-implementer
    priority: medium
    status: completed
    depends_on: [T5, T6, T7]
    context_files:
      - "apps/baseline/src/functions/httpStart.ts": HTTP trigger contract
      - "infra/outputs.tf": Terraform outputs for URLs
    estimated_effort: medium
    estimated_files: 4
    estimated_lines: 300
    focus_area: load testing
    verification:
      - JMeter plan opens and validates in JMeter GUI
      - Manual curl/PowerShell commands successfully start orchestrations
      - Seed data script creates expected blobs
    acceptance_criteria:
      - JMeter plan targets both function apps with parameterized URLs
      - Load test configurable for different concurrency levels
      - Manual testing documented with example commands
      - Seed data script populates workload storage with test blobs
    failure_modes:
      - scenario: JMeter thread groups overwhelm function apps before scaling kicks in
        likelihood: medium
        impact: medium
        mitigation: Use ramp-up period; start with low concurrency and increase gradually
    tech_stack:
      - Apache JMeter
      - Azure Load Testing
      - Azure CLI
    test_coverage: null

  # ─── ANALYTICS ──────────────────────────────────────────────
  - id: T9
    title: Build KQL queries and Azure Monitor Workbook for comparison
    description: |
      In analytics/:
      1. KQL queries (individual .kql files):
         - orchestration_duration_comparison.kql: P50/P95/P99 orchestration duration by app
         - activity_duration_breakdown.kql: duration per activity by app
