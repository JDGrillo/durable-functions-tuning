plan_id: perf-comparison-v1
objective: |
  Compare performance of two identical Azure Durable Function apps (Node.js 20, v4 programming model)
  with different host.json and scaling configurations. Both apps use Azure Storage provider, run on
  Elastic Premium EP3 plans, perform Blob Storage I/O in 3 sequential activities, and emit custom
  OpenTelemetry traces to a shared Application Insights instance. Include Terraform infrastructure,
  Azure Load Testing, and KQL analytics for side-by-side comparison.
created_at: "2026-04-01"
created_by: requirements-planner
status: completed
research_confidence: high

tldr: |
  Monorepo with two Durable Function apps (baseline vs tuned) sharing identical orchestration logic
  (3 sequential Blob Storage I/O activities). Custom OpenTelemetry spans/metrics on every function.
  Terraform provisions EP3 plans, shared App Insights, Blob Storage, and Azure Load Testing.
  KQL queries and a workbook enable side-by-side performance comparison.

requirements_summary: |
  1. Two Azure Durable Function apps (Node.js 20, Azure Functions v4 programming model)
  2. Azure Storage provider for durable task hub (each app uses its own task hub)
  3. Each app: 1 HTTP-triggered starter, 1 orchestrator, 3 sequential activity functions
  4. Activity logic: Azure Blob Storage read/write operations (I/O-bound)
  5. Business logic is identical between both apps — shared as a common package
  6. App "baseline": default host.json, default app settings, default scaling
  7. App "tuned": optimized host.json (concurrency, partitions, queue batch size),
     tuned app settings (FUNCTIONS_WORKER_PROCESS_COUNT, node options),
     Elastic Premium scaling config (max burst, always-ready instances)
  8. Custom telemetry: OpenTelemetry custom spans + metrics + correlation IDs on
     orchestrator and all activities, sent to shared Application Insights
  9. Both apps on Elastic Premium EP3 (4 vCPU, 14 GB)
  10. Terraform for all Azure infrastructure
  11. Azure Load Testing resource + JMeter test plan for concurrent orchestration triggering
  12. Manual HTTP trigger endpoint for ad-hoc testing
  13. KQL queries + Azure Monitor Workbook for comparing execution times, delays, throughput
  14. No CI/CD pipelines in scope

open_questions: []

risk_assessment:
  overall_risk_level: medium
  critical_risks:
    - scenario: Durable Functions v4 + OpenTelemetry integration has breaking changes or limited docs
      likelihood: medium
      impact: medium
      mitigation: Research current SDK state early (Task 1); fall back to applicationinsights SDK direct if needed
    - scenario: Tuned host.json parameters cause instability under high load
      likelihood: low
      impact: high
      mitigation: Start with documented recommended values; load test incrementally
    - scenario: Shared App Insights instance creates noisy data making comparison difficult
      likelihood: medium
      impact: medium
      mitigation: Use cloud_RoleName and custom dimensions to distinguish apps in all telemetry; validate with KQL early
    - scenario: Azure Load Testing quotas or regional limits delay testing
      likelihood: low
      impact: medium
      mitigation: Provision in a region with ALT availability; have manual trigger as fallback
  assumptions:
    - User has an Azure subscription with permissions to create EP3 plans and Azure Load Testing
    - Azure Blob Storage latency is representative enough to surface configuration differences
    - Node.js 20 LTS is the target runtime through the project lifecycle
    - TypeScript will be used (standard for v4 programming model)
  constraints:
    - Both function apps must have byte-identical business logic (enforced via shared package)
    - Only the configuration layer differs between baseline and tuned apps
    - EP3 SKU is fixed — no SKU comparison in scope
    - No CI/CD pipelines in initial scope

implementation_specification:
  code_structure: |
    Monorepo using npm workspaces. Shared package contains all business logic (activities,
    orchestrator, telemetry helpers). Each function app is a thin wrapper that imports from
    shared and provides its own host.json + local.settings.json.
  affected_areas:
    - apps/baseline/ — baseline function app with default configuration
    - apps/tuned/ — tuned function app with optimized configuration
    - packages/shared/ — shared orchestrator, activities, and telemetry instrumentation
    - infra/ — Terraform modules for all Azure resources
    - loadtest/ — Azure Load Testing JMeter plan and configuration
    - analytics/ — KQL queries and workbook JSON template
  component_details:
    - component: packages/shared
      responsibility: |
        Contains all business logic (3 activity functions + orchestrator) and telemetry
        instrumentation. Both function apps import from this package to guarantee identical logic.
      interfaces:
        - "activity1BlobRead(context, input): Promise<ActivityResult>"
        - "activity2BlobTransform(context, input): Promise<ActivityResult>"
        - "activity3BlobWrite(context, input): Promise<ActivityResult>"
        - "orchestrator(context): Generator"
        - "createTelemetryHelper(appName): TelemetryHelper"
    - component: apps/baseline
      responsibility: |
        Azure Functions v4 app with default host.json. Registers orchestrator and activities
        from shared package. HTTP-triggered starter function.
      interfaces:
        - "POST /api/orchestrators/{orchestratorName} — starts orchestration"
        - "GET /api/orchestrators/{orchestratorName}/{instanceId} — status query"
    - component: apps/tuned
      responsibility: |
        Azure Functions v4 app with optimized host.json, tuned app settings, and EP3
        scaling configuration. Same function registrations as baseline.
      interfaces:
        - "POST /api/orchestrators/{orchestratorName} — starts orchestration"
        - "GET /api/orchestrators/{orchestratorName}/{instanceId} — status query"
    - component: infra
      responsibility: |
        Terraform root module provisioning all Azure resources: 2x EP3 plans, 2x function apps,
        1x App Insights + Log Analytics workspace, 2x Storage accounts (task hub), 2x Storage
        accounts (workload blobs, one per app to eliminate I/O contention), 1x Azure Load Testing resource.
      interfaces:
        - "terraform apply — provisions all resources"
        - "outputs: function_app_urls, app_insights_connection_string, load_test_id"
    - component: loadtest
      responsibility: |
        JMeter test plan (.jmx) for Azure Load Testing. Parameterized to target both function
        app endpoints. Configurable concurrency, duration, and ramp-up.
      interfaces:
        - "loadtest.jmx — JMeter plan for ALT"
        - "loadtest.config.yaml — ALT configuration file"
    - component: analytics
      responsibility: |
        KQL query library and Azure Monitor Workbook template for side-by-side comparison of
        execution times, queue delays, activity durations, throughput, and error rates.
      interfaces:
        - "queries/*.kql — individual KQL queries"
        - "workbook.json — ARM/Bicep-deployable workbook template"
  dependencies:
    - component: apps/baseline
      relationship: imports business logic and telemetry from packages/shared
    - component: apps/tuned
      relationship: imports business logic and telemetry from packages/shared
    - component: loadtest
      relationship: targets HTTP endpoints from apps/baseline and apps/tuned
    - component: analytics
      relationship: queries telemetry schema defined in packages/shared telemetry helpers
  integration_points:
    - Both function apps → shared Application Insights instance (via connection string)
    - Baseline activity functions → baseline Blob Storage account (workload I/O)
    - Tuned activity functions → tuned Blob Storage account (workload I/O)
    - Durable orchestrator → per-app Azure Storage (task hub queues and tables)
    - Azure Load Testing → function app HTTP endpoints
    - KQL workbook → Application Insights / Log Analytics workspace

