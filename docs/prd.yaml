prd_id: durable-function-config-comparison
version: "2.0.0"
status: final

features:
  - name: Baseline Durable Function App
    overview: |
      Azure Durable Functions app (Node.js 20, v4 model) with default host.json configuration,
      running 1 orchestrator + 3 sequential Blob Storage I/O activities on Elastic Premium EP3.
    status: planned

  - name: Tuned Durable Function App
    overview: |
      Identical business logic to baseline but with optimized host.json (concurrency, partitions,
      queue batch size, extended sessions), tuned app settings (worker process count, Node memory),
      and EP3 scaling config (always-ready, max burst, pre-warmed instances).
    status: planned

  - name: Custom OpenTelemetry Instrumentation
    overview: |
      Shared telemetry module emitting custom spans, histogram metrics, and correlation IDs for
      every orchestrator and activity execution. Replay-safe. Reports to shared Application Insights
      with cloud_RoleName differentiation (baseline vs tuned).
    status: planned

  - name: Terraform Infrastructure
    overview: |
      Full Azure infrastructure: 2x EP3 plans, 2x function apps, 4x storage accounts (2 task hubs + 2
      workload blobs), 1x shared App Insights + Log Analytics, 1x Azure Load Testing resource.
    status: planned

  - name: Azure Load Testing Integration
    overview: |
      JMeter test plan targeting both function app endpoints with configurable concurrency and duration.
      Azure Load Testing resource for managed execution. Manual HTTP trigger option for ad-hoc testing.
    status: planned

  - name: KQL Analytics & Workbook
    overview: |
      8 KQL queries for side-by-side performance comparison (duration, queue delay, throughput, errors,
      scaling) and a 4-tab Azure Monitor Workbook template for visualization.
    status: planned

  - name: Inline-Payloads Durable Function App (OOM Anti-Pattern)
    overview: |
      Azure Durable Functions app demonstrating the OOM anti-pattern — passes large payloads
      (200KB-1.6MB) inline through orchestration activity I/O. Uses default high concurrency
      settings (40/40). Three activities (dataEnricher, expressionResolver, dataTransformer)
      model a customer scenario where inline payload accumulation causes memory pressure
      and OOM kills under concurrent load.
    status: planned

  - name: Externalized-Payloads Durable Function App (Best Practice)
    overview: |
      Azure Durable Functions app demonstrating the recommended pattern — stores intermediate
      payloads in Blob Storage and passes only blob URI references through orchestration I/O.
      Uses reduced concurrency settings (10/5). Includes continueAsNew sub-orchestrator to
      prevent unbounded orchestration history growth. Same business logic as inline-payloads
      but with dramatically lower memory footprint.
    status: planned

  - name: Memory Usage Telemetry
    overview: |
      Custom OpenTelemetry metrics tracking process.memoryUsage() (heapUsed, heapTotal, rss)
      after every activity execution. Payload size metrics (input/output bytes) and
      externalization dimension for comparing inline vs blob reference patterns.
    status: planned

state_machines:
  - name: Durable Orchestration Lifecycle
    states: [Started, Activity1Running, Activity2Running, Activity3Running, Completed, Failed]
    transitions:
      - from: Started
        to: Activity1Running
        trigger: orchestrator schedules activity1BlobRead
      - from: Activity1Running
        to: Activity2Running
        trigger: activity1 completes, orchestrator schedules activity2BlobTransform
      - from: Activity2Running
        to: Activity3Running
        trigger: activity2 completes, orchestrator schedules activity3BlobWrite
      - from: Activity3Running
        to: Completed
        trigger: activity3 completes, orchestrator returns result
      - from: Activity1Running
        to: Failed
        trigger: activity1 throws unrecoverable error
      - from: Activity2Running
        to: Failed
        trigger: activity2 throws unrecoverable error
      - from: Activity3Running
        to: Failed
        trigger: activity3 throws unrecoverable error

  - name: OOM Payload Orchestration Lifecycle (Inline)
    states: [Started, Enriching, Resolving, Transforming, Completed, Failed, OOMKilled]
    transitions:
      - from: Started
        to: Enriching
        trigger: orchestrator schedules dataEnricher with full inline payload
      - from: Enriching
        to: Resolving
        trigger: dataEnricher completes, full enriched payload returned inline
      - from: Resolving
        to: Transforming
        trigger: expressionResolver completes, full resolved payload returned inline
      - from: Transforming
        to: Completed
        trigger: dataTransformer completes, full transformed payload returned inline
      - from: Enriching
        to: OOMKilled
        trigger: container OOM-killed due to accumulated inline payload memory
      - from: Resolving
        to: OOMKilled
        trigger: container OOM-killed during replay with large history
      - from: Enriching
        to: Failed
        trigger: activity throws unrecoverable error
      - from: Resolving
        to: Failed
        trigger: activity throws unrecoverable error
      - from: Transforming
        to: Failed
        trigger: activity throws unrecoverable error

  - name: OOM Payload Orchestration Lifecycle (Externalized + continueAsNew)
    states: [Started, Enriching, Resolving, Transforming, BatchComplete, ContinuingAsNew, Completed, Failed]
    transitions:
      - from: Started
        to: Enriching
        trigger: orchestrator schedules dataEnricher with blob URI reference
      - from: Enriching
        to: Resolving
        trigger: dataEnricher completes, returns blob URI reference (~200 bytes)
      - from: Resolving
        to: Transforming
        trigger: expressionResolver completes, returns blob URI reference
      - from: Transforming
        to: BatchComplete
        trigger: dataTransformer completes current batch item
      - from: BatchComplete
        to: Enriching
        trigger: more items in batch, process next item
      - from: BatchComplete
        to: ContinuingAsNew
        trigger: batch limit reached, call continueAsNew to reset history
      - from: ContinuingAsNew
        to: Started
        trigger: orchestrator restarts with fresh history and continuation state
      - from: BatchComplete
        to: Completed
        trigger: all items processed, no more batches

errors:
  - code: ERR_BLOB_READ_001
    message: Failed to read source blob — blob not found or storage unavailable
  - code: ERR_BLOB_WRITE_001
    message: Failed to write output blob — container not found or storage unavailable
  - code: ERR_ORCHESTRATION_001
    message: Orchestration failed — activity error exceeded retry policy
  - code: ERR_OOM_001
    message: Container terminated by OOM killer (exit code 137) — inline payload memory exceeded container limit
  - code: ERR_PAYLOAD_STORE_001
    message: Failed to externalize payload to blob storage — container not found or storage unavailable
  - code: ERR_PAYLOAD_RETRIEVE_001
    message: Failed to retrieve externalized payload from blob storage — blob not found or expired

decisions:
  - decision: Monorepo with npm workspaces and shared package for identical business logic
    rationale: |
      Guarantees both apps execute byte-identical logic. Changes propagate to both apps
      automatically. Simpler than git submodules or duplicated code.
  - decision: Shared Application Insights instance for both function apps
    rationale: |
      Enables side-by-side KQL comparison using cloud_RoleName. Eliminates need to
      cross-query multiple workspaces. Simpler workbook configuration.
  - decision: Separate Storage accounts for each app's Durable Task hub and workload blobs
    rationale: |
      Each app gets its own task hub storage AND workload blob storage (4 accounts total).
      Prevents both queue/table and blob I/O contention between apps. Ensures storage
      metrics are fully isolated for accurate performance comparison.
  - decision: OpenTelemetry manual instrumentation (not auto-instrumentation)
    rationale: |
      Auto-instrumentation may conflict with Durable Functions replay semantics.
      Manual spans with isReplaying guards ensure accurate telemetry.
  - decision: Azure Load Testing over self-hosted load testing tools
    rationale: |
      Managed service avoids provisioning load generation infrastructure. Native Azure
      integration for CI/CD (future) and results correlation with App Insights.
  - decision: Elastic Premium EP3 for both apps
    rationale: |
      EP3 (4 vCPU, 14 GB) provides sufficient headroom to observe tuning differences.
      Same SKU for both ensures fair comparison — only configuration differs.
  - decision: Externalize large payloads via Blob Storage for the remediated (externalized-payloads) app
    rationale: |
      Passing multi-hundred-KB to multi-MB payloads inline through orchestration I/O causes
      unbounded memory growth during replay. Storing payloads in blobs and passing only URI
      references (~200 bytes) keeps orchestration history small and memory stable.
  - decision: Use continueAsNew in the externalized-payloads app sub-orchestrator for batch processing
    rationale: |
      Long-running orchestrations accumulate history events indefinitely. continueAsNew resets
      the history after each batch, preventing unbounded event accumulation and reducing
      replay memory cost.
  - decision: Separate shared-oom package rather than extending shared package
    rationale: |
      The OOM scenario has fundamentally different activity logic (data enrichment/resolution/transformation
      vs blob I/O) and different telemetry requirements (memory tracking). Keeping it isolated avoids
      polluting the existing comparison scenario.

changes:
  - version: "2.0.0"
    change: |
      Added OOM payload scenario with inline-payloads and externalized-payloads apps,
      packages/shared-oom package, memory telemetry, continueAsNew pattern, and
      KQL queries for memory analysis. Extends Terraform for 2 additional function apps.
